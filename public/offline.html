<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Comm's · Offline</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: #0f1117; color: #e2e4ec;
    font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: 2rem;
  }
  main { max-width: 420px; text-align: center; }
  h1 { font-size: 22px; margin: 0 0 .5rem; letter-spacing: .01em; }
  p { color: #b5b8c5; margin: 0 0 1.25rem; line-height: 1.5; }
  button {
    font: inherit; padding: .6rem 1rem; border-radius: 8px;
    border: 1px solid #7c9ef8; background: #7c9ef8; color: #fff; cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<main>
  <h1>You're offline</h1>
  <p>Comm's can't reach the server. Check your connection and try again.</p>
  <button onclick="location.reload()">Retry</button>
</main>
</body>
</html>
